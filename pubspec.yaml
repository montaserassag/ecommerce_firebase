name: ecommerce_firebase
description: E-Commerce App — Firebase Auth + Firestore + Offline Caching
publish_to: 'none'
version: 1.3.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  path_provider: ^2.1.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # ✅ تم إضافة حزمة الأيقونات هنا
  flutter_launcher_icons: ^0.13.1

# ✅ إعدادات توليد الأيقونة المخصصة لمتجرك
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true

  # ✅ تم تفعيل مجلد الـ assets ليقرأ النظام صورتك الجديدة
  assets:
    - assets/
    - assets/app_icon.png